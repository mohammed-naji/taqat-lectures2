<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="product">
    <img src="images/Tips-for-Choosing-Medical-Equipment-For-Your-Practice.jpg" alt="">
    <span class="price">120$</span>
    <div class="content">
      <h2>Medical Equipment New</h2>
      <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Sit, excepturi?</p>

      <div class="total-price">
        <span id="price">120</span> * <span id="new-qyt">1</span> = <span id="total">120</span>
      </div>

      <div class="add-to-cart">
        <div class="btns">
          <button id="mins">-</button>
          <input type="text" id="qyt" value="1">
          <button id="plus">+</button>
        </div>

        <div class="add-cart-btn">
          <button>Add To Cart</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>

</html>
